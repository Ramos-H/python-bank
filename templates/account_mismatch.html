<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Account Mismatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fff5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="text-center px-4">
        <div style="font-size: 4rem;">❌</div>
        <h2 class="fw-bold text-danger mt-3">Account Mismatch</h2>
        <p class="text-muted mt-2">
            The bank account you're logged in with does not match
            the account that placed this order.
        </p>

        <div class="card mt-4 shadow-sm border-danger border-opacity-25 text-start">
            <div class="card-body">
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Order placed by</span>
                    <strong class="text-danger">{{ payer_username }}</strong>
                </div>
                <div class="d-flex justify-content-between">
                    <span class="text-muted">You are logged in as</span>
                    <strong class="text-danger">{{ bank_user }}</strong>
                </div>
            </div>
        </div>

        <p class="mt-4 text-muted small">
            Please log out and sign in with the correct account to complete this payment.
        </p>

        <a href="/login" class="btn btn-outline-danger mt-2">Log in with a different account</a>
    </div>
</body>
</html>
